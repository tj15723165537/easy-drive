spring:
  datasource:
    url: jdbc:mysql://your-prod-host:3306/easy_drive?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=GMT%2B8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    com.easy.drive.serve: info
    org.springframework.security: warn

swagger:
  enabled: false
